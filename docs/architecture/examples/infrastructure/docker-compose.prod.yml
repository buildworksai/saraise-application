# ✅ APPROVED: Production Docker Compose setup
# docker-compose.prod.yml
# Reference: docs/architecture/operational-runbooks.md § 0 (Container Orchestration)
# CRITICAL NOTES:
# - ALL secrets MUST be sourced from HashiCorp Vault or environment secrets (security-model.md § 5)
# - Database connection strings provided via environment variables ONLY
# - Session secret keys must be generated per-deployment and rotated regularly
# - TLS/SSL certificates MUST be present for all external-facing services
# - Health checks MUST verify database connectivity AND Policy Engine availability
# - Backup services MUST be immutable with audit logging (operational-runbooks.md § 6.2)
# - All containers run as non-root users with minimal capabilities
# - Resource limits MUST be enforced (CPU, memory) to prevent DoS
# Source: docs/architecture/operational-runbooks.md § 0, security-model.md § 5

version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT:-30000}:${API_CONTAINER_PORT:-30000}"
    environment:
      - DATABASE_URL=${PRODUCTION_DATABASE_URL}
      - REDIS_URL=${PRODUCTION_REDIS_URL}
      - OPENSEARCH_URL=${PRODUCTION_OPENSEARCH_URL}
      - SESSION_SECRET_KEY=${PRODUCTION_SESSION_SECRET_KEY}
      - APP_ENV=production
      - LOG_LEVEL=${LOG_LEVEL_PRODUCTION:-WARN}
    depends_on:
      - db
      - redis
      - opensearch
      - vault
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

  # Frontend
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HOST_PORT:-15000}:${FRONTEND_CONTAINER_PORT:-15000}"
    environment:
      - VITE_API_URL=${PRODUCTION_API_URL}
    depends_on:
      - api
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

  # Database
  db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:${POSTGRES_CONTAINER_PORT:-5432}"
    environment:
      - POSTGRES_DB=saraise_prod
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

  # Redis
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "${REDIS_HOST_PORT:-26379}:${REDIS_CONTAINER_PORT:-6379}"
    volumes:
      - redis_prod_data:/data
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

  # OpenSearch Cluster (3-node for HA)
  # Reference: docs/architecture/search-architecture.md
  opensearch-node1:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.11.1}
    environment:
      - cluster.name=saraise-prod
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_master_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - opensearch_prod_data_1:/usr/share/opensearch/data
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

  opensearch-node2:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.11.1}
    environment:
      - cluster.name=saraise-prod
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_master_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - opensearch_prod_data_2:/usr/share/opensearch/data
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

  opensearch-node3:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.11.1}
    environment:
      - cluster.name=saraise-prod
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_master_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - opensearch_prod_data_3:/usr/share/opensearch/data
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    ports:
      - "${PROMETHEUS_HOST_PORT:-19090}:${PROMETHEUS_CONTAINER_PORT:-9090}"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ${NETWORK_PROD:-saraise-prod}
    restart: unless-stopped

volumes:
  postgres_prod_data:
  redis_prod_data:
  opensearch_prod_data_1:
  opensearch_prod_data_2:
  opensearch_prod_data_3:
  prometheus_data:

networks:
  ${NETWORK_PROD:-saraise-prod}:
    driver: bridge

