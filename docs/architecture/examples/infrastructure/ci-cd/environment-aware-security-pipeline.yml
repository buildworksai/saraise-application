# ✅ APPROVED: Environment-Aware Security Testing Pipeline
# Reference: docs/architecture/security-model.md § 5 (Security Operations)
# CRITICAL NOTES:
# - SAST scans (Semgrep) MUST validate no hardcoded secrets or credentials (security-model.md § 5)
# - DAST scans (OWASP ZAP) MUST validate API authentication and Row-Level Multitenancy enforcement
# - Dependency scanning MUST enforce no vulnerable dependencies (npm audit --audit-level high minimum)
# - Container image scanning (Trivy) MUST validate zero critical/high vulnerabilities
# - All security test results MUST be captured in audit logs (security-model.md § 4.2)
# - Development environment: relaxed scanning for developer velocity (npm audit --audit-level moderate)
# - Staging environment: comprehensive scanning matching production (npm audit --audit-level high)
# - Production environment: maximum security scanning (all tools, zero tolerance for findings)
# - Security findings MUST block deployment to production (engineering-governance-and-pr-controls.md § 3)
# Source: docs/architecture/security-model.md § 5, engineering-governance-and-pr-controls.md § 3

name: SARAISE Security Testing Pipeline
on: [push, pull_request]

jobs:
  security-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, staging, production]

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install Dependencies
        run: npm ci

      - name: Basic Security Checks (All Environments)
        run: |
          npm audit --audit-level moderate
          npm run lint:security

      - name: Development Security Tests
        if: matrix.environment == 'development'
        run: |
          npm run test:security:basic
          npm run lint:security:basic

      - name: Staging Security Tests
        if: matrix.environment == 'staging'
        run: |
          npm run test:security:standard
          npm run lint:security:strict
          npm run sast:scan
          npm run dependency:scan

      - name: Production Security Tests
        if: matrix.environment == 'production'
        run: |
          npm run test:security:comprehensive
          npm run lint:security:maximum
          npm run sast:scan:comprehensive
          npm run dast:scan
          npm run dependency:scan:strict
          npm run container:security:scan

