# ✅ APPROVED: Complete development Docker Compose setup
# docker-compose.dev.yml
# Reference: docs/architecture/operational-runbooks.md § 0 (Container Orchestration)
# CRITICAL NOTES:
# - All secrets sourced from environment variables (see env-required.sh, env-development.sh)
# - Database connections must include tenant_id filtering (row-level multitenancy)
# - Redis backend requires secure configuration (no plaintext credentials)
# - All services must enforce CORS from trusted origins only (security-model.md § 3.2)
# - Development environment MUST NOT contain production secrets (security-model.md § 5)
# Source: docs/architecture/operational-runbooks.md § 0

version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${API_HOST_PORT:-30000}:${API_CONTAINER_PORT:-30000}"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:${POSTGRES_CONTAINER_PORT:-5432}/saraise_dev
      - REDIS_URL=redis://redis:${REDIS_CONTAINER_PORT:-6379}
      - OPENSEARCH_URL=http://opensearch:${OPENSEARCH_CONTAINER_PORT:-9200}
      - APP_ENV=development
      - LOG_LEVEL=${LOG_LEVEL_DEVELOPMENT:-DEBUG}
    depends_on:
      - db
      - redis
      - opensearch
    volumes:
      - ./backend:/app
      - /app/venv
    command: gunicorn src.wsgi:application --bind 0.0.0.0:${API_CONTAINER_PORT:-30000} --workers 4 --reload
    networks:
      - ${NETWORK_DEV:-saraise-dev}

  # Frontend
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_HOST_PORT:-20000}:${FRONTEND_CONTAINER_PORT:-15000}"
    environment:
      - VITE_API_URL=http://localhost:${API_HOST_PORT:-30000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - ${NETWORK_DEV:-saraise-dev}

  # Database
  db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:${POSTGRES_CONTAINER_PORT:-5432}"
    environment:
      - POSTGRES_DB=saraise_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ${NETWORK_DEV:-saraise-dev}

  # Redis
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "${REDIS_HOST_PORT:-26379}:${REDIS_CONTAINER_PORT:-6379}"
    volumes:
      - redis_dev_data:/data
    networks:
      - ${NETWORK_DEV:-saraise-dev}

  # OpenSearch for full-text search and analytics
  # Reference: docs/architecture/search-architecture.md
  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.11.1}
    ports:
      - "${OPENSEARCH_HOST_PORT:-19200}:${OPENSEARCH_CONTAINER_PORT:-9200}"
      - "${OPENSEARCH_NODE_PORT:-19300}:${OPENSEARCH_NODE_PORT:-9300}"
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=OpenSearchDev123!
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
      - logger.level=info
    volumes:
      - opensearch_dev_data:/usr/share/opensearch/data
    networks:
      - ${NETWORK_DEV:-saraise-dev}

  # MinIO Object Storage
  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    ports:
      - "${MINIO_API_HOST_PORT:-19000}:${MINIO_API_CONTAINER_PORT:-9000}"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:${MINIO_CONSOLE_CONTAINER_PORT:-9001}"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":${MINIO_CONSOLE_CONTAINER_PORT:-9001}"
    networks:
      - ${NETWORK_DEV:-saraise-dev}

  # MailHog for email testing
  mailhog:
    image: ${MAILHOG_IMAGE:-mailhog/mailhog:latest}
    ports:
      - "${MAILHOG_SMTP_HOST_PORT:-11025}:${MAILHOG_SMTP_CONTAINER_PORT:-1025}"  # SMTP
      - "${MAILHOG_UI_HOST_PORT:-18025}:${MAILHOG_UI_CONTAINER_PORT:-8025}"  # Web UI
    networks:
      - ${NETWORK_DEV:-saraise-dev}

  # Vault for secrets management
  vault:
    image: ${VAULT_IMAGE:-hashicorp/vault:1.15.2}
    ports:
      - "${VAULT_HOST_PORT:-18200}:${VAULT_CONTAINER_PORT:-8200}"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:${VAULT_CONTAINER_PORT:-8200}
    cap_add:
      - IPC_LOCK
    networks:
      - ${NETWORK_DEV:-saraise-dev}

volumes:
  postgres_dev_data:
  redis_dev_data:
  opensearch_dev_data:
  minio_dev_data:

networks:
  ${NETWORK_DEV:-saraise-dev}:
    driver: bridge

