# ✅ APPROVED: Prometheus Monitoring Configuration
# monitoring/prometheus.yml
# Reference: docs/architecture/operational-runbooks.md § 4.1 (Health Monitoring)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# CRITICAL: Prometheus collects metrics for operational visibility
# All metrics must include tenant context where applicable
# See docs/architecture/operational-runbooks.md § 4.1

scrape_configs:
  - job_name: 'saraise-api'
    static_configs:
      - targets: ['api:${API_CONTAINER_PORT:-30000}']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:${POSTGRES_EXPORTER_CONTAINER_PORT:-9187}']

