# SPDX-License-Identifier: Apache-2.0
name: SARAISE CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Quality Gates - SARAISE-04001, SARAISE-04002, SARAISE-02013
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.19.1'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: "Regression guard: forbid Jest flags in CI commands"
        run: |
          matches="$(grep -R --line-number --fixed-strings -- '--watchAll' .github/workflows/*.yml || true)"
          # Ignore this guard's own grep invocation line(s).
          matches="$(printf '%s\n' "$matches" | grep -v --fixed-strings "-- '--watchAll'" || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "❌ Jest flag '--watchAll' found in workflow commands"
            exit 1
          fi

      - name: Detect backend Python project
        id: backend
        run: |
          if [ -f backend/pyproject.toml ] || [ -f backend/setup.py ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # Backend Quality Checks
      - name: Install Python dependencies
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          pip install -e .
          pip install -e .[dev,test]

      - name: Run Python linting (flake8)
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          flake8 src/ --max-line-length=120 --exclude=__pycache__,migrations --ignore=E203,W503

      - name: Run Python formatting check (black)
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          black --check src/

      - name: Run Python import sorting check (isort)
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          isort --check-only src/

      - name: MyPy Type Check (Baseline + Ratcheting) - SARAISE-02013
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          if [ -f ./scripts/mypy-baseline.sh ]; then
            ./scripts/mypy-baseline.sh check
          else
            mypy src --ignore-missing-imports
          fi
        continue-on-error: false

      - name: Run Python tests with coverage
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          pytest tests/ --cov=src --cov-report=xml --cov-report=term
        continue-on-error: false

      - name: Check Python coverage threshold (≥90%) - SARAISE-01002
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          coverage report --fail-under=90 || (echo "❌ Coverage below 90% threshold" && exit 1)

      # Frontend Quality Checks
      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript Check (Zero Errors) - SARAISE-04002
        run: |
          cd frontend
          npm run typecheck
        continue-on-error: false

      - name: ESLint Check (Zero Warnings) - SARAISE-04001
        run: |
          cd frontend
          npm run lint
        continue-on-error: false

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          npm test -- --coverage
        continue-on-error: false

      - name: Check frontend coverage threshold (≥90%) - SARAISE-01002
        run: |
          cd frontend
          if [ -f "coverage/coverage-summary.json" ]; then
            node -e "const s=require('./coverage/coverage-summary.json');const cov=s.total.lines.pct||0;if(cov<90){console.error('❌ Frontend coverage '+cov+'% is below 90% threshold');process.exit(1)}else{console.log('✅ Frontend coverage: '+cov+'%')}"
          else
            echo "❌ Coverage report missing - Test run failed to generate artifacts"
            exit 1
          fi

      # Security Scanning - SARAISE-01003, SARAISE-01004
      - name: Python security audit (safety)
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          pip install safety
          safety check || (echo "❌ Security vulnerabilities found" && exit 1)

      - name: Node.js security audit
        run: |
          cd frontend
          npm audit --audit-level moderate || (echo "❌ Security vulnerabilities found" && exit 1)

      # SAST - Static Application Security Testing (SARAISE-01005)
      - name: SAST Scan (Semgrep)
        run: |
          pip install semgrep
          semgrep --config=auto --config=.semgrep/custom-rules.yaml \
            --json --output=semgrep-results.json \
            --error || true
          
          # Check for critical/high findings
          if [ -f semgrep-results.json ]; then
            CRITICAL=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ SAST found $CRITICAL critical/high findings. Blocking merge."
              cat semgrep-results.json | jq '.results[] | select(.extra.severity == "ERROR")'
              exit 1
            else
              echo "✅ SAST scan passed (no critical/high findings)"
            fi
          fi
          
          # Upload SARIF for GitHub Security tab
          semgrep --config=auto --config=.semgrep/custom-rules.yaml \
            --sarif --output=semgrep-results.sarif || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep-results.sarif') != ''
        with:
          sarif_file: semgrep-results.sarif
          wait-for-processing: false

  # Tenant Isolation Tests - Critical Security Gate
  tenant-isolation-tests:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Detect backend Python project
        id: backend
        run: |
          if [ -f backend/pyproject.toml ] || [ -f backend/setup.py ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Python dependencies
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          pip install -e .[dev,test]

      - name: Run tenant isolation tests
        if: ${{ steps.backend.outputs.present == 'true' }}
        run: |
          cd backend
          # Run only tests tagged with tenant isolation
          pytest tests/ -v -k "isolation or tenant" --tb=short
        continue-on-error: false

  # Build and Test
  build-and-test:
    needs: [quality-gates, tenant-isolation-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build backend image
      - name: Build backend image
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Container Security Scanning - Trivy (SARAISE-01006)
      - name: Scan backend container image (Trivy)
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-api:test
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: false

      - name: Upload Trivy backend SARIF
        if: always() && hashFiles('backend/Dockerfile') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          wait-for-processing: false

      # Build frontend image
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Container Security Scanning - Trivy (SARAISE-01006)
      - name: Scan frontend container image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:test
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: false

      - name: Upload Trivy frontend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          wait-for-processing: false

  # Performance Baseline Check (New)
  performance-baseline:
    if: github.event_name == 'pull_request'
    needs: [quality-gates]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bundle sizes
        run: |
          cd frontend
          npm ci
          npm run build

          # Check main bundle size (gzipped)
          BUNDLE_SIZE=$(find dist -name '*.js' -exec gzip -c {} \; | wc -c)
          MAX_SIZE=614400  # 600KB total gzipped

          if [ "$BUNDLE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "❌ Bundle size ($BUNDLE_SIZE bytes) exceeds limit ($MAX_SIZE bytes)"
            exit 1
          else
            echo "✅ Bundle size: $BUNDLE_SIZE bytes (limit: $MAX_SIZE bytes)"
          fi

  # Deploy to Staging
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: [quality-gates, tenant-isolation-tests, build-and-test]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          if [ ! -f scripts/deploy-staging.sh ]; then
            echo "ℹ️ Skipping staging deploy: scripts/deploy-staging.sh not present"
            exit 0
          fi
          chmod +x scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          STAGING_POSTGRES_CONNECTION_STRING: ${{ secrets.STAGING_POSTGRES_CONNECTION_STRING }}
          STAGING_REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}

  # Deploy to Production
  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [quality-gates, tenant-isolation-tests, build-and-test]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          if [ ! -f scripts/deploy-production.sh ]; then
            echo "ℹ️ Skipping production deploy: scripts/deploy-production.sh not present"
            exit 0
          fi
          chmod +x scripts/deploy-production.sh
          ./scripts/deploy-production.sh
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          POSTGRES_CONNECTION_STRING: ${{ secrets.PRODUCTION_POSTGRES_CONNECTION_STRING }}
          REDIS_URL: ${{ secrets.PRODUCTION_REDIS_URL }}
          SESSION_SECRET_KEY: ${{ secrets.PRODUCTION_SESSION_SECRET_KEY }}
