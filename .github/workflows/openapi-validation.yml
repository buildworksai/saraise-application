# ===================================
# SARAISE OpenAPI Schema Validation
# ===================================
# Validates OpenAPI schema generation and consistency
# ===================================

name: OpenAPI Schema Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate-openapi:
    name: Validate OpenAPI Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          cd backend
          pip install -e .[dev]
          pip install openapi-spec-validator

      - name: Configure Django
        run: |
          echo "SECRET_KEY=$(python -c 'from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())')" >> "$GITHUB_ENV"
          echo "ALLOWED_HOSTS=localhost" >> "$GITHUB_ENV"

      - name: Generate OpenAPI Schema
        run: |
          cd backend
          python manage.py spectacular --file schema.yaml --format openapi-json

      - name: Validate OpenAPI Schema
        run: |
          python3 - <<'PY'
          import yaml
          from openapi_spec_validator import validate_spec

          with open("backend/schema.yaml") as schema_file:
              spec = yaml.safe_load(schema_file)

          validate_spec(spec)
          print("OpenAPI schema is valid")
          PY

      - name: Check Schema Completeness
        run: |
          python3 - <<'PY'
          import yaml

          with open("backend/schema.yaml") as schema_file:
              spec = yaml.safe_load(schema_file)

          paths = spec.get("paths", {})
          required_prefixes = ("/api/v1/crm/", "/api/v1/platform/")
          missing = [prefix for prefix in required_prefixes if not any(path.startswith(prefix) for path in paths)]

          if missing:
              raise SystemExit(f"Missing API path prefixes in schema: {missing}")

          print("All required API path prefixes are present")
          PY
