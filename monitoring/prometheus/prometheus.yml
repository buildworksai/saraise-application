# SARAISE Prometheus Configuration
# Reference: docs/architecture/operational-runbooks.md § 4.1

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/saraise-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'saraise-auth'
    static_configs:
      - targets: ['auth:8001']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'saraise-policy-engine'
    static_configs:
      - targets: ['policy-engine:8003']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'saraise-runtime'
    static_configs:
      - targets: ['runtime:8002']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'saraise-control-plane'
    static_configs:
      - targets: ['control-plane:8004']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'saraise-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics/'
    scrape_interval: 10s

  - job_name: 'saraise-backend-legacy'
    static_configs:
      - targets: ['backend-legacy:8005']
    metrics_path: '/metrics/'
    scrape_interval: 10s
