# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: communication_hub
version: 1.0.0
category: foundation
display_name: Communication Hub
description: |
  Centralized communication management including messages, channels, and conversations.

# Dependencies
dependencies: []

# Permissions
permissions:
  - communication.channel:create
  - communication.channel:read
  - communication.message:create
  - communication.message:read
  - communication.conversation:read

# Health Checks
health_checks:
  - name: database_connectivity
    endpoint: /health/db
    interval: 60
