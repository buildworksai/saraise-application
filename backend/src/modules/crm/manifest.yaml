# Rule SARAISE-00001: signed module contract fields plus signed metadata.
name: crm
version: 1.0.0
description: >-
  Tenant-isolated customer acquisition, relationship activity, opportunity
  pipeline, evidence-based scoring, and currency-grouped sales forecasting.
type: domain
lifecycle: managed

# CRM is fully useful alone. The current installer resolves every item in this
# field, so optional integrations are capability declarations in signed
# metadata below rather than false hard dependencies.
dependencies: []

permissions:
  - crm.lead:create
  - crm.lead:read
  - crm.lead:update
  - crm.lead:delete
  - crm.lead:convert
  - crm.lead:score
  - crm.account:create
  - crm.account:read
  - crm.account:update
  - crm.account:delete
  - crm.contact:create
  - crm.contact:read
  - crm.contact:update
  - crm.contact:delete
  - crm.contact:override_domain
  - crm.opportunity:create
  - crm.opportunity:read
  - crm.opportunity:update
  - crm.opportunity:delete
  - crm.opportunity:close
  - crm.opportunity:reopen_stage
  - crm.activity:create
  - crm.activity:read
  - crm.activity:update
  - crm.activity:complete
  - crm.forecasting:read
  - crm.forecasting:predict
  - crm.configuration:read
  - crm.configuration:write
  - crm.configuration:import
  - crm.configuration:export
  - crm.configuration:rollback
  - crm.health:read

sod_actions:
  - crm.opportunity:create
  - crm.opportunity:close

search_indexes:
  - crm_leads
  - crm_accounts
  - crm_contacts
  - crm_opportunities
  - crm_activities

ai_tools:
  - crm.lead.score
  - crm.forecasting.predict

metadata:
  display_name: Customer Relationship Management
  category: core_business
  api:
    canonical_prefix: /api/v2/crm/
    legacy_prefix: /api/v1/crm/
    legacy_status: deprecated
    legacy_sunset_not_before: "2027-01-22"
    health_endpoint: /api/v2/crm/health/
    default_page_size: 25
    maximum_page_size: 100
    endpoints:
      - path: /api/v2/crm/leads/
        methods: [GET, POST]
        permissions: {GET: "crm.lead:read", POST: "crm.lead:create"}
      - path: "/api/v2/crm/leads/{id}/"
        methods: [GET, PATCH, DELETE]
        permissions: {GET: "crm.lead:read", PATCH: "crm.lead:update", DELETE: "crm.lead:delete"}
      - path: "/api/v2/crm/leads/{id}/transition/"
        methods: [POST]
        permissions: {POST: "crm.lead:update"}
      - path: "/api/v2/crm/leads/{id}/convert/"
        methods: [POST]
        permissions: {POST: "crm.lead:convert"}
      - path: "/api/v2/crm/leads/{id}/score/"
        methods: [POST]
        permissions: {POST: "crm.lead:score"}
      - path: /api/v2/crm/accounts/
        methods: [GET, POST]
        permissions: {GET: "crm.account:read", POST: "crm.account:create"}
      - path: "/api/v2/crm/accounts/{id}/"
        methods: [GET, PATCH, DELETE]
        permissions: {GET: "crm.account:read", PATCH: "crm.account:update", DELETE: "crm.account:delete"}
      - path: "/api/v2/crm/accounts/{id}/hierarchy/"
        methods: [GET]
        permissions: {GET: "crm.account:read"}
      - path: /api/v2/crm/accounts/duplicates/
        methods: [GET]
        permissions: {GET: "crm.account:read"}
      - path: /api/v2/crm/contacts/
        methods: [GET, POST]
        permissions: {GET: "crm.contact:read", POST: "crm.contact:create"}
      - path: "/api/v2/crm/contacts/{id}/"
        methods: [GET, PATCH, DELETE]
        permissions: {GET: "crm.contact:read", PATCH: "crm.contact:update", DELETE: "crm.contact:delete"}
      - path: /api/v2/crm/opportunities/
        methods: [GET, POST]
        permissions: {GET: "crm.opportunity:read", POST: "crm.opportunity:create"}
      - path: "/api/v2/crm/opportunities/{id}/"
        methods: [GET, PATCH, DELETE]
        permissions: {GET: "crm.opportunity:read", PATCH: "crm.opportunity:update", DELETE: "crm.opportunity:delete"}
      - path: "/api/v2/crm/opportunities/{id}/transition/"
        methods: [POST]
        permissions: {POST: "crm.opportunity:update"}
        additional_permission_when_reopening: "crm.opportunity:reopen_stage"
      - path: "/api/v2/crm/opportunities/{id}/close-won/"
        methods: [POST]
        permissions: {POST: "crm.opportunity:close"}
      - path: "/api/v2/crm/opportunities/{id}/close-lost/"
        methods: [POST]
        permissions: {POST: "crm.opportunity:close"}
      - path: /api/v2/crm/activities/
        methods: [GET, POST]
        permissions: {GET: "crm.activity:read", POST: "crm.activity:create"}
      - path: "/api/v2/crm/activities/{id}/"
        methods: [GET, PATCH]
        permissions: {GET: "crm.activity:read", PATCH: "crm.activity:update"}
      - path: "/api/v2/crm/activities/{id}/complete/"
        methods: [POST]
        permissions: {POST: "crm.activity:complete"}
      - path: /api/v2/crm/forecasting/pipeline/
        methods: [GET]
        permissions: {GET: "crm.forecasting:read"}
      - path: /api/v2/crm/forecasting/win-rate/
        methods: [GET]
        permissions: {GET: "crm.forecasting:read"}
      - path: /api/v2/crm/forecasting/by-stage/
        methods: [GET]
        permissions: {GET: "crm.forecasting:read"}
      - path: /api/v2/crm/forecasting/predict/
        methods: [POST]
        permissions: {POST: "crm.forecasting:predict"}
      - path: "/api/v2/crm/jobs/{id}/"
        methods: [GET]
        command_permissions:
          crm.scan_stale_deals: crm.opportunity:read
          crm.score_lead: crm.lead:score
          crm.sync_external_activity: crm.activity:create
          crm.acknowledge_sales_order: crm.opportunity:close
      - path: /api/v2/crm/configuration/
        methods: [GET, PATCH, PUT]
        permissions: {GET: "crm.configuration:read", PATCH: "crm.configuration:write", PUT: "crm.configuration:write"}
      - path: /api/v2/crm/configuration/preview/
        methods: [POST]
        permissions: {POST: "crm.configuration:write"}
      - path: /api/v2/crm/configuration/versions/
        methods: [GET]
        permissions: {GET: "crm.configuration:read"}
      - path: /api/v2/crm/configuration/rollback/
        methods: [POST]
        permissions: {POST: "crm.configuration:rollback"}
      - path: /api/v2/crm/configuration/import/
        methods: [POST]
        permissions: {POST: "crm.configuration:import"}
      - path: /api/v2/crm/configuration/export/
        methods: [GET]
        permissions: {GET: "crm.configuration:export"}
      - path: /api/v2/crm/health/
        methods: [GET]
        permissions: {GET: "crm.health:read"}
    legacy_alias:
      prefix: /api/v1/crm/
      coverage: all_endpoints
      sunset_not_before: "2027-01-22"
  entitlement: crm
  optional_dependencies:
    workflow_automation:
      version: ">=1.0.0"
      capability: workflow_events
      failure_policy: degrade
    email_marketing:
      version: ">=1.0.0"
      capability: external_activity_events
      failure_policy: degrade
    sales_management:
      version: ">=1.0.0"
      capability: post_win_fulfillment
      failure_policy: durable_retry
    master_data_management:
      version: ">=1.0.0"
      capability: account_enrichment
      failure_policy: local_exact_match
  configuration:
    model: src.modules.crm.models.CRMConfiguration
    version_model: src.modules.crm.models.CRMConfigurationVersion
    audit_model: src.modules.crm.models.CRMConfigurationAudit
    tenant_key: tenant_id
    environment_key: environment
    schema_source: src.modules.crm.configuration.DEFAULT_CRM_CONFIGURATION
    default_feature_flags_source: src.modules.crm.configuration.DEFAULT_FEATURE_FLAGS
    default_rollout_source: src.modules.crm.configuration.DEFAULT_ROLLOUT
    validation_service: src.modules.crm.services.CRMConfigurationService
    validation_method: validate_document
    server_side_validation: true
    validation:
      bounds_source: src.modules.crm.services.CRMConfigurationService.validate_document
      environment_allow_list_source: src.modules.crm.services.CONFIGURATION_ENVIRONMENTS
      document_section_allow_list_source: src.modules.crm.configuration.DEFAULT_CRM_CONFIGURATION
      physical_field_limit_caps_source: src.modules.crm.configuration.DEFAULT_CRM_CONFIGURATION.field_limits
      enum_allow_lists_source: src.modules.crm.models
      invalid_value_policy: reject_atomically_before_save
    versioned: true
    rollback_to_any_version: true
    immutable_audit: true
    correlation_id_required: true
    ui_route: /crm/configuration
    api_route: /api/v2/crm/configuration/
    permissions:
      read: crm.configuration:read
      write: crm.configuration:write
      import: crm.configuration:import
      export: crm.configuration:export
      rollback: crm.configuration:rollback
    sections:
      - field_limits
      - lead
      - account
      - contact
      - opportunity
      - activity
      - hierarchy
      - forecast
      - providers
      - jobs
      - pagination
      - api
      - conversion
      - health
      - ui
      - feature_flags
      - rollout
  state_machines:
    crm.lead:
      state_field: status
      history_field: transition_history
      tenant_configurable: true
      configuration_source: configuration.document.lead
      validation_service: src.modules.crm.services.CRMConfigurationService.validate_document
      terminal_states: [converted, lost]
      commands: [contact, qualify, disqualify, convert]
    crm.opportunity:
      state_field: stage
      history_field: transition_history
      tenant_configurable: true
      configuration_source: configuration.document.opportunity
      validation_service: src.modules.crm.services.CRMConfigurationService.validate_document
      terminal_states: [closed_won, closed_lost]
      commands:
        - advance_to_qualification
        - advance_to_needs_analysis
        - advance_to_proposal
        - advance_to_negotiation
        - close_won
        - close_lost
        - reopen_to_prospecting
        - reopen_to_qualification
        - reopen_to_needs_analysis
        - reopen_to_proposal
  durable_jobs:
    - command: crm.scan_stale_deals
      handler: crm.jobs.scan_stale_deals
      initiating_permission: crm.opportunity:read
    - command: crm.score_lead
      handler: crm.jobs.process_lead_scoring_job
      initiating_permission: crm.lead:score
    - command: crm.sync_external_activity
      handler: crm.jobs.process_external_activity_event
      initiating_permission: crm.activity:create
    - command: crm.acknowledge_sales_order
      handler: crm.jobs.process_fulfillment_acknowledgement
      initiating_permission: crm.opportunity:close
  health_checks:
    - name: database
      critical: true
    - name: domain_schema
      critical: true
    - name: required_migrations
      critical: true
    - name: row_level_security
      critical: true
    - name: async_outbox
      critical: true
    - name: cache
      critical: false
    - name: lead_scoring_provider
      critical: false
    - name: revenue_prediction_provider
      critical: false
    - name: optional_extensions
      critical: false
  extension_contract:
    schema_version: "1.0"
    capabilities:
      - qualification_signals
      - account_enrichment
      - product_references
      - territory_assignment
      - post_win_fulfillment
      - transition_veto_guards
      - post_transition_event_effects
    metadata_namespace: industry.<module>.<field>
    replacement_policy: forbidden
    arbitration: priority_then_provider_key
  event_contract:
    schema_version: 1
    encoding:
      uuid: canonical_string
      decimal: base_10_string
      datetime: rfc3339
    compatibility: additive_within_schema_version
    envelope_fields:
      - event_id
      - schema_id
      - schema_version
      - event_type
      - module
      - tenant_id
      - aggregate_type
      - aggregate_id
      - actor_id
      - correlation_id
      - causation_id
      - job_id
      - occurred_at
      - payload
    publishes:
      - crm.lead.created
      - crm.lead.updated
      - crm.lead.deleted
      - crm.lead.contacted
      - crm.lead.qualified
      - crm.lead.disqualified
      - crm.lead.status_changed
      - crm.lead.scored
      - crm.lead.converted
      - crm.account.created
      - crm.account.updated
      - crm.account.deleted
      - crm.account.became_customer
      - crm.contact.created
      - crm.contact.updated
      - crm.contact.deleted
      - crm.contact.engagement_recalculated
      - crm.opportunity.created
      - crm.opportunity.updated
      - crm.opportunity.deleted
      - crm.opportunity.stage_changed
      - crm.opportunity.closed_won
      - crm.opportunity.closed_lost
      - crm.opportunity.order_acknowledged
      - crm.activity.created
      - crm.activity.updated
      - crm.activity.completed
      - crm.activity.external_synced
      - crm.stale_deal.detected
    consumes:
      - email_marketing.email.sent.v1
      - email_marketing.email.opened.v1
      - email_marketing.email.clicked.v1
      - sales_management.order.created.v1
    sales_order_acknowledgement:
      event_type: sales_management.order.created.v1
      required_fields: [event_id, tenant_id, opportunity_id, order_id, correlation_id, delivery_verified]
