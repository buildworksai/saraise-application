# Rule SARAISE-00001: signed module contract fields plus signed metadata.
name: crm
version: 1.0.0
description: >-
  Tenant-isolated customer acquisition, relationship activity, opportunity
  pipeline, evidence-based scoring, and currency-grouped sales forecasting.
type: domain
lifecycle: managed

# CRM is fully useful alone. The current installer resolves every item in this
# field, so optional integrations are capability declarations in signed
# metadata below rather than false hard dependencies.
dependencies: []

permissions:
  - crm.lead:create
  - crm.lead:read
  - crm.lead:update
  - crm.lead:delete
  - crm.lead:convert
  - crm.lead:score
  - crm.account:create
  - crm.account:read
  - crm.account:update
  - crm.account:delete
  - crm.contact:create
  - crm.contact:read
  - crm.contact:update
  - crm.contact:delete
  - crm.contact:override_domain
  - crm.opportunity:create
  - crm.opportunity:read
  - crm.opportunity:update
  - crm.opportunity:delete
  - crm.opportunity:close
  - crm.opportunity:reopen_stage
  - crm.activity:create
  - crm.activity:read
  - crm.activity:update
  - crm.activity:delete
  - crm.activity:complete
  - crm.forecasting:read
  - crm.forecasting:predict
  - crm.health:read

sod_actions:
  - crm.opportunity:create
  - crm.opportunity:close

search_indexes:
  - crm_leads
  - crm_accounts
  - crm_contacts
  - crm_opportunities
  - crm_activities

ai_tools:
  - crm.lead.score
  - crm.forecasting.predict

metadata:
  display_name: Customer Relationship Management
  category: core_business
  api:
    canonical_prefix: /api/v2/crm/
    legacy_prefix: /api/v1/crm/
    legacy_status: deprecated
    legacy_sunset_not_before: "2027-01-22"
    health_endpoint: /api/v2/crm/health/
    default_page_size: 25
    maximum_page_size: 100
  entitlement: crm
  optional_dependencies:
    workflow_automation:
      version: ">=1.0.0"
      capability: workflow_events
      failure_policy: degrade
    email_marketing:
      version: ">=1.0.0"
      capability: external_activity_events
      failure_policy: degrade
    sales_management:
      version: ">=1.0.0"
      capability: post_win_fulfillment
      failure_policy: durable_retry
    master_data_management:
      version: ">=1.0.0"
      capability: account_enrichment
      failure_policy: local_exact_match
  configuration:
    lead_score_threshold:
      type: integer
      default: 70
      minimum: 0
      maximum: 100
    stale_deal_days:
      type: integer
      default: 14
      minimum: 1
      maximum: 365
    lead_scoring_provider:
      type: provider_reference
      required: false
    revenue_prediction_provider:
      type: provider_reference
      required: false
    pipeline_stages:
      - name: prospecting
        probability: 10
      - name: qualification
        probability: 20
      - name: needs_analysis
        probability: 40
      - name: proposal
        probability: 60
      - name: negotiation
        probability: 80
      - name: closed_won
        probability: 100
      - name: closed_lost
        probability: 0
  state_machines:
    crm.lead:
      state_field: status
      history_field: transition_history
      terminal_states: [converted, lost]
      commands: [contact, qualify, disqualify, convert]
    crm.opportunity:
      state_field: stage
      history_field: transition_history
      terminal_states: [closed_won, closed_lost]
      commands:
        - advance_to_qualification
        - advance_to_needs_analysis
        - advance_to_proposal
        - advance_to_negotiation
        - close_won
        - close_lost
        - reopen_to_prospecting
        - reopen_to_qualification
        - reopen_to_needs_analysis
        - reopen_to_proposal
  durable_jobs:
    - command: crm.scan_stale_deals
      handler: crm.jobs.scan_stale_deals
      initiating_permission: crm.opportunity:read
    - command: crm.score_lead
      handler: crm.jobs.process_lead_scoring_job
      initiating_permission: crm.lead:score
    - command: crm.sync_external_activity
      handler: crm.jobs.process_external_activity_event
      initiating_permission: crm.activity:create
    - command: crm.acknowledge_sales_order
      handler: crm.jobs.process_fulfillment_acknowledgement
      initiating_permission: crm.opportunity:close
  health_checks:
    - name: database
      critical: true
    - name: domain_schema
      critical: true
    - name: required_migrations
      critical: true
    - name: row_level_security
      critical: true
    - name: async_outbox
      critical: true
    - name: cache
      critical: false
    - name: lead_scoring_provider
      critical: false
    - name: revenue_prediction_provider
      critical: false
    - name: optional_extensions
      critical: false
  extension_contract:
    schema_version: "1.0"
    capabilities:
      - qualification_signals
      - account_enrichment
      - product_references
      - territory_assignment
      - post_win_fulfillment
      - transition_veto_guards
      - post_transition_event_effects
    metadata_namespace: industry.<module>.<field>
    replacement_policy: forbidden
    arbitration: priority_then_provider_key
  event_contract:
    schema_version: 1
    encoding:
      uuid: canonical_string
      decimal: base_10_string
      datetime: rfc3339
    compatibility: additive_within_schema_version
    envelope_fields:
      - event_id
      - schema_id
      - schema_version
      - event_type
      - module
      - tenant_id
      - aggregate_type
      - aggregate_id
      - actor_id
      - correlation_id
      - causation_id
      - job_id
      - occurred_at
      - payload
    publishes:
      - crm.lead.created
      - crm.lead.updated
      - crm.lead.deleted
      - crm.lead.contacted
      - crm.lead.qualified
      - crm.lead.disqualified
      - crm.lead.status_changed
      - crm.lead.scored
      - crm.lead.converted
      - crm.account.created
      - crm.account.updated
      - crm.account.deleted
      - crm.account.became_customer
      - crm.contact.created
      - crm.contact.updated
      - crm.contact.deleted
      - crm.contact.engagement_recalculated
      - crm.opportunity.created
      - crm.opportunity.updated
      - crm.opportunity.deleted
      - crm.opportunity.stage_changed
      - crm.opportunity.closed_won
      - crm.opportunity.closed_lost
      - crm.opportunity.order_acknowledged
      - crm.activity.created
      - crm.activity.updated
      - crm.activity.deleted
      - crm.activity.completed
      - crm.activity.external_synced
      - crm.stale_deal.detected
    consumes:
      - email_marketing.email.sent.v1
      - email_marketing.email.opened.v1
      - email_marketing.email.clicked.v1
      - sales_management.order.created.v1
    sales_order_acknowledgement:
      event_type: sales_management.order.created.v1
      required_fields: [event_id, tenant_id, opportunity_id, order_id, correlation_id, delivery_verified]
