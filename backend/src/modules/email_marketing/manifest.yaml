name: email_marketing
version: 2.0.0
description: >-
  Tenant-isolated, consent-aware email campaign authoring, durable delivery,
  suppression management, provider event processing, and analytics.
type: domain
lifecycle: managed
dependencies: []

permissions:
  - email_marketing.campaign:read
  - email_marketing.campaign:create
  - email_marketing.campaign:update
  - email_marketing.campaign:delete
  - email_marketing.campaign:resolve_audience
  - email_marketing.campaign:schedule
  - email_marketing.campaign:send
  - email_marketing.campaign:pause
  - email_marketing.campaign:cancel
  - email_marketing.analytics:read
  - email_marketing.template:read
  - email_marketing.template:create
  - email_marketing.template:update
  - email_marketing.template:delete
  - email_marketing.template:activate
  - email_marketing.recipient:read
  - email_marketing.recipient:retry
  - email_marketing.delivery:read
  - email_marketing.suppression:read
  - email_marketing.suppression:manage
  - email_marketing.consent:read
  - email_marketing.consent:record
  - email_marketing.consent:revoke
  - email_marketing.health:read
  - email_marketing.provider_event:ingest
  - email_marketing.configuration:read
  - email_marketing.configuration:manage
  - email_marketing.configuration:export

sod_actions:
  - email_marketing.campaign:send
  - email_marketing.suppression:manage

search_indexes:
  - email_campaigns
  - email_templates
  - email_campaign_recipients
  - email_suppression_entries

entities:
  - {name: email_templates, model: EmailTemplate, tenancy: tenant_id, mutability: lifecycle_controlled}
  - {name: email_campaigns, model: EmailCampaign, tenancy: tenant_id, mutability: lifecycle_controlled}
  - {name: email_consent_records, model: ConsentRecord, tenancy: tenant_id, mutability: append_only}
  - {name: email_campaign_recipients, model: CampaignRecipient, tenancy: tenant_id, mutability: lifecycle_controlled}
  - {name: email_delivery_attempts, model: DeliveryAttempt, tenancy: tenant_id, mutability: revision_controlled}
  - {name: email_delivery_attempt_revisions, model: DeliveryAttemptRevision, tenancy: tenant_id, mutability: append_only}
  - {name: email_delivery_events, model: DeliveryEvent, tenancy: tenant_id, mutability: append_only}
  - {name: email_suppression_entries, model: SuppressionEntry, tenancy: tenant_id, mutability: lifecycle_controlled}
  - {name: email_marketing_configurations, model: EmailMarketingConfiguration, tenancy: tenant_id, mutability: versioned}
  - {name: email_marketing_configuration_versions, model: EmailMarketingConfigurationVersion, tenancy: tenant_id, mutability: append_only}
  - {name: email_marketing_lifecycle_transitions, model: LifecycleTransitionAudit, tenancy: tenant_id, mutability: append_only}
  - {name: email_marketing_mutation_idempotency, model: MutationIdempotencyRecord, tenancy: tenant_id, mutability: append_only}

endpoints:
  - {path: campaigns/, methods: [GET], permission: "email_marketing.campaign:read", tenancy: required, pagination: configured, mutability: read_only}
  - {path: campaigns/, methods: [POST], permission: "email_marketing.campaign:create", tenancy: required, pagination: none, mutability: creates}
  - {path: "campaigns/{id}/", methods: [GET], permission: "email_marketing.campaign:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: "campaigns/{id}/", methods: [PATCH], permission: "email_marketing.campaign:update", tenancy: required, pagination: none, mutability: updates}
  - {path: "campaigns/{id}/", methods: [DELETE], permission: "email_marketing.campaign:delete", tenancy: required, pagination: none, mutability: archives}
  - {path: "campaigns/{id}/resolve-audience/", methods: [POST], permission: "email_marketing.campaign:resolve_audience", tenancy: required, pagination: none, mutability: enqueues_idempotently}
  - {path: "campaigns/{id}/preflight/", methods: [GET], permission: "email_marketing.campaign:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: "campaigns/{id}/schedule/", methods: [POST], permission: "email_marketing.campaign:schedule", tenancy: required, pagination: none, mutability: transitions_idempotently}
  - {path: "campaigns/{id}/unschedule/", methods: [POST], permission: "email_marketing.campaign:schedule", tenancy: required, pagination: none, mutability: transitions_idempotently}
  - {path: "campaigns/{id}/send/", methods: [POST], permission: "email_marketing.campaign:send", tenancy: required, pagination: none, mutability: enqueues_idempotently}
  - {path: "campaigns/{id}/pause/", methods: [POST], permission: "email_marketing.campaign:pause", tenancy: required, pagination: none, mutability: transitions_idempotently}
  - {path: "campaigns/{id}/resume/", methods: [POST], permission: "email_marketing.campaign:send", tenancy: required, pagination: none, mutability: transitions_idempotently}
  - {path: "campaigns/{id}/cancel/", methods: [POST], permission: "email_marketing.campaign:cancel", tenancy: required, pagination: none, mutability: transitions_idempotently}
  - {path: "campaigns/{id}/analytics/", methods: [GET], permission: "email_marketing.analytics:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: templates/, methods: [GET], permission: "email_marketing.template:read", tenancy: required, pagination: configured, mutability: read_only}
  - {path: templates/, methods: [POST], permission: "email_marketing.template:create", tenancy: required, pagination: none, mutability: creates}
  - {path: "templates/{id}/", methods: [GET], permission: "email_marketing.template:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: "templates/{id}/", methods: [PATCH], permission: "email_marketing.template:update", tenancy: required, pagination: none, mutability: updates}
  - {path: "templates/{id}/", methods: [DELETE], permission: "email_marketing.template:delete", tenancy: required, pagination: none, mutability: archives}
  - {path: "templates/{id}/activate/", methods: [POST], permission: "email_marketing.template:activate", tenancy: required, pagination: none, mutability: transitions_idempotently}
  - {path: "templates/{id}/archive/", methods: [POST], permission: "email_marketing.template:activate", tenancy: required, pagination: none, mutability: transitions_idempotently}
  - {path: "templates/{id}/clone/", methods: [POST], permission: "email_marketing.template:create", tenancy: required, pagination: none, mutability: creates}
  - {path: "templates/{id}/preview/", methods: [POST], permission: "email_marketing.template:read", tenancy: required, pagination: none, mutability: simulation_only}
  - {path: recipients/, methods: [GET], permission: "email_marketing.recipient:read", tenancy: required, pagination: configured, mutability: read_only}
  - {path: "recipients/{id}/", methods: [GET], permission: "email_marketing.recipient:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: "recipients/{id}/retry/", methods: [POST], permission: "email_marketing.recipient:retry", tenancy: required, pagination: none, mutability: enqueues_idempotently}
  - {path: deliveries/, methods: [GET], permission: "email_marketing.delivery:read", tenancy: required, pagination: configured, mutability: read_only}
  - {path: "deliveries/{id}/", methods: [GET], permission: "email_marketing.delivery:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: suppressions/, methods: [GET], permission: "email_marketing.suppression:read", tenancy: required, pagination: configured, mutability: read_only}
  - {path: suppressions/, methods: [POST], permission: "email_marketing.suppression:manage", tenancy: required, pagination: none, mutability: creates}
  - {path: "suppressions/{id}/", methods: [GET], permission: "email_marketing.suppression:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: "suppressions/{id}/deactivate/", methods: [POST], permission: "email_marketing.suppression:manage", tenancy: required, pagination: none, mutability: transitions}
  - {path: consents/, methods: [GET], permission: "email_marketing.consent:read", tenancy: required, pagination: configured, mutability: read_only}
  - {path: consents/, methods: [POST], permission: "email_marketing.consent:record", tenancy: required, pagination: none, mutability: appends}
  - {path: "consents/{id}/", methods: [GET], permission: "email_marketing.consent:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: consents/revoke/, methods: [POST], permission: "email_marketing.consent:revoke", tenancy: required, pagination: none, mutability: appends}
  - {path: configuration/current/, methods: [GET], permission: "email_marketing.configuration:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: configuration/current/, methods: [PUT], permission: "email_marketing.configuration:manage", tenancy: required, pagination: none, mutability: versioned_update}
  - {path: configuration/preview/, methods: [POST], permission: "email_marketing.configuration:read", tenancy: required, pagination: none, mutability: simulation_only}
  - {path: configuration/history/, methods: [GET], permission: "email_marketing.configuration:read", tenancy: required, pagination: none, mutability: read_only}
  - {path: configuration/rollback/, methods: [POST], permission: "email_marketing.configuration:manage", tenancy: required, pagination: none, mutability: versioned_update}
  - {path: configuration/import-document/, methods: [POST], permission: "email_marketing.configuration:manage", tenancy: required, pagination: none, mutability: versioned_update}
  - {path: configuration/export-document/, methods: [GET], permission: "email_marketing.configuration:export", tenancy: required, pagination: none, mutability: read_only}
  - {path: provider-events/, methods: [POST], permission: "email_marketing.provider_event:ingest", tenancy: trusted_provider_binding, pagination: none, mutability: appends_and_enqueues}
  - {path: public/unsubscribe/, methods: [POST], permission: signed_unsubscribe_token, tenancy: signed_token, pagination: none, mutability: creates_suppression}
  - {path: "t/{token}/open.gif", methods: [GET], permission: signed_tracking_token, tenancy: signed_token, pagination: none, mutability: appends_tracking_event}
  - {path: "t/{token}/click/", methods: [GET], permission: signed_tracking_token, tenancy: signed_token, pagination: none, mutability: appends_tracking_event}
  - {path: health/, methods: [GET], permission: "email_marketing.health:read", tenancy: required, pagination: none, mutability: read_only}

ai_tools: []

metadata:
  display_name: Email Marketing
  category: core_business
  entitlement: email_marketing
  api:
    canonical_prefix: /api/v2/email-marketing/
    health_endpoint: /api/v2/email-marketing/health/
    pagination_configuration: pagination
  quota_resources:
    - name: email_marketing.api_reads
      cost: 1
      configuration_key: quotas.api_reads
    - name: email_marketing.api_writes
      cost: 1
      configuration_key: quotas.api_writes
    - name: email_marketing.audience_resolutions
      cost: 1
      configuration_key: quotas.audience_resolutions
    - name: email_marketing.monthly_recipients
      cost_projection: eligible_recipient
      configuration_key: quotas.monthly_recipients
  state_machines:
    email_marketing.campaign:
      state_field: status
      history_field: transition_history
      terminal_states: [sent, cancelled]
    email_marketing.template:
      state_field: status
      terminal_states: [archived]
    email_marketing.recipient:
      state_field: status
      history_field: transition_history
      non_regressing_states: [delivered, bounced, complained, unsubscribed]
  durable_jobs:
    - command: email_marketing.resolve_audience
      handler: email_marketing.jobs.resolve_audience_handler
      initiating_permission: email_marketing.campaign:resolve_audience
    - command: email_marketing.send_campaign
      handler: email_marketing.jobs.send_campaign_handler
      initiating_permission: email_marketing.campaign:send
    - command: email_marketing.send_recipient
      handler: email_marketing.jobs.send_recipient_handler
      initiating_permission: email_marketing.campaign:send
    - command: email_marketing.reconcile_delivery
      handler: email_marketing.jobs.reconcile_delivery_handler
      initiating_permission: email_marketing.recipient:retry
    - command: email_marketing.process_provider_event
      handler: email_marketing.jobs.process_provider_event_handler
      initiating_permission: email_marketing.provider_event:ingest
  health_checks:
    - {name: database, critical: true}
    - {name: domain_schema, critical: true}
    - {name: required_migrations, critical: true}
    - {name: row_level_security, critical: true}
    - {name: state_machines, critical: true}
    - {name: async_handlers, critical: true}
    - {name: outbox_freshness, critical: true}
    - {name: renderer, critical: true}
    - {name: delivery_gateway, critical: true}
    - {name: audience_resolver, critical: false}
  extension_contract:
    spi_version: "1.0"
    compatibility: major_version_exact
    registration: app_ready
    replacement_policy: forbidden
    arbitration: explicit_key_only
    metadata_namespace: industry.<module>.<field>
    capabilities:
      - audience_resolvers
      - template_variables
      - content_blocks
      - delivery_gateways
      - provider_event_verifiers
      - preflight_guards
      - analytics_enrichments
    core_guards_non_replaceable: [tenant, consent, suppression, access, lifecycle]
  event_contract:
    schema_version: 1
    encoding:
      uuid: canonical_string
      datetime: rfc3339
    compatibility: additive_within_schema_version
    envelope_fields:
      - event_id
      - schema_id
      - schema_version
      - event_version
      - event_type
      - module
      - tenant_id
      - aggregate_type
      - aggregate_id
      - actor_id
      - correlation_id
      - causation_id
      - job_id
      - occurred_at
      - payload
    publishes:
      - email_marketing.campaign.created.v1
      - email_marketing.campaign.scheduled.v1
      - email_marketing.campaign.send_queued.v1
      - email_marketing.campaign.sent.v1
      - email_marketing.campaign.failed.v1
      - email_marketing.email.sent.v1
      - email_marketing.email.delivered.v1
      - email_marketing.email.opened.v1
      - email_marketing.email.clicked.v1
      - email_marketing.email.bounced.v1
      - email_marketing.email.unsubscribed.v1
      - email_marketing.consent.changed.v1
      - email_marketing.suppression.changed.v1
    provider_event_trust:
      tenant_source: trusted_provider_account_binding
      payload_tenant_ids: forbidden
      signature_required: true
      replay_window_required: true
  uninstall:
    preserve_delivery_and_compliance_evidence: true
    unregister_adapters: true
    unregister_commands: true
