name: security-access-control
version: 1.0.0
description: Enterprise authorization administration with tenant-safe RBAC, field and row policy, security profiles, access simulation, and immutable evidence
type: foundation
lifecycle: core
dependencies:
  - core-identity >=1.0.0
permissions:
  - security.roles:create
  - security.roles:read
  - security.roles:update
  - security.roles:delete
  - security.permissions:read
  - security.assignments:create
  - security.assignments:read
  - security.assignments:update
  - security.assignments:delete
  - security.permission-sets:create
  - security.permission-sets:read
  - security.permission-sets:update
  - security.permission-sets:delete
  - security.field-security:create
  - security.field-security:read
  - security.field-security:update
  - security.field-security:delete
  - security.row-security:create
  - security.row-security:read
  - security.row-security:update
  - security.row-security:delete
  - security.security-profiles:create
  - security.security-profiles:read
  - security.security-profiles:update
  - security.security-profiles:delete
  - security.audit-logs:read
  - security.access:simulate
sod_actions:
  - security.roles:delete
  - security.security-profiles:update
search_indexes:
  - security_roles
  - security_permissions
  - security_audit_logs
metadata:
  policy_ownership:
    development: local
    self-hosted: local
    saas: remote
  remote_policy_dependency:
    key: policy-engine
    evaluation_path: /api/v1/evaluate
    health_path: /health/ready
    fail_closed: true
  extension_contract:
    schema_version: "1.0"
    public_import: src.modules.security_access_control.extensions
    permission_catalog:
      namespace: security
      ownership: manifest
    resource_security:
      descriptors: field-metadata
      namespace_ownership: manifest
    row_policy:
      schema: safe-predicate
      schema_version: "1.0"
