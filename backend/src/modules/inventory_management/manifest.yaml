name: inventory_management
version: 2.0.0
category: core_business
display_name: Inventory & Warehouse Management
description: >-
  Tenant-isolated inventory operations with warehouse and location control,
  valued stock posting, batch and serial traceability, reservations, cycle
  counting, and audited runtime configuration.
dependencies:
  - name: master_data_management
    version: ">=1.0.0"
    required: false
    purpose: Optional product-master enrichment
permissions:
  - inventory.warehouse:create
  - inventory.warehouse:read
  - inventory.warehouse:update
  - inventory.warehouse:delete
  - inventory.location:create
  - inventory.location:read
  - inventory.location:update
  - inventory.location:delete
  - inventory.item:create
  - inventory.item:read
  - inventory.item:update
  - inventory.item:delete
  - inventory.batch:create
  - inventory.batch:read
  - inventory.batch:update
  - inventory.batch:transition
  - inventory.serial:create
  - inventory.serial:read
  - inventory.serial:update
  - inventory.stock_entry:create
  - inventory.stock_entry:read
  - inventory.stock_entry:update
  - inventory.stock_entry:delete
  - inventory.stock_entry:submit
  - inventory.stock_entry:approve
  - inventory.stock_entry:reject
  - inventory.stock_entry:post
  - inventory.stock_entry:cancel
  - inventory.stock_entry:reverse
  - inventory.stock_balance:read
  - inventory.stock_ledger:read
  - inventory.reservation:create
  - inventory.reservation:read
  - inventory.reservation:update
  - inventory.reservation:transition
  - inventory.cycle_count:create
  - inventory.cycle_count:read
  - inventory.cycle_count:update
  - inventory.cycle_count:start
  - inventory.cycle_count:submit
  - inventory.cycle_count:approve
  - inventory.cycle_count:reject
  - inventory.cycle_count:post
  - inventory.cycle_count:cancel
  - inventory.configuration:read
  - inventory.configuration:update
  - inventory.configuration:preview
  - inventory.configuration:activate
  - inventory.configuration:rollback
  - inventory.configuration:import
  - inventory.configuration:export
  - inventory.configuration:audit
  - inventory.report:read
  - inventory.bulk:import
  - inventory.health:read
sod_actions:
  - [inventory.stock_entry:create, inventory.stock_entry:approve]
health_checks:
  - name: inventory_readiness
    endpoint: /api/v2/inventory-management/health/
    interval: 60
metadata:
  api_version: v2
  entitlement: inventory_management
  quotas:
    ordinary_requests: inventory.api.requests
    stock_posting: inventory.stock.post
    bulk_rows: inventory.bulk.rows
  capabilities:
    - warehouses_and_locations
    - valued_stock_posting
    - batch_and_serial_traceability
    - reservations
    - cycle_counting
    - runtime_configuration
  extension_boundary: inventory_outbox_events_v1
