# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: budget_management
version: 1.0.0
category: core_business
display_name: Budget Management
description: |
  Budget planning, allocation, tracking, and variance analysis.

# Dependencies
dependencies:
  - name: accounting_finance
    version: ">=1.0.0"
    required: false
    purpose: Account mapping for budget lines

# Permissions
permissions:
  - budget.budget:create
  - budget.budget:read
  - budget.budget:update
  - budget.budget_line:create
  - budget.budget_line:read
  - budget.variance:read

# Health Checks
health_checks:
  - name: database_connectivity
    endpoint: /health/db
    interval: 60
