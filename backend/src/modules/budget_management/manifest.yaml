name: budget_management
version: 2.0.0
category: core_business
display_name: Budget Management
description: >-
  Tenant-safe budget planning, allocations, governed approvals, availability
  control, actual-versus-budget analysis, and durable variance alerting.
api_prefix: /api/v2/budget-management/
module_key: budget_management
entitlement: module.budget_management
modes:
  - development
  - self-hosted
  - saas

dependencies:
  - name: accounting_finance
    version: ">=1.0.0"
    required: false
    purpose: Account validation and evidenced actual synchronization
  - name: workflow_management
    version: ">=1.0.0"
    required: false
    purpose: Approval policy and approver assignments
  - name: notification_service
    version: ">=1.0.0"
    required: false
    purpose: Durable budget and variance notifications

permissions:
  - budget.budget:create
  - budget.budget:read
  - budget.budget:update
  - budget.budget:delete
  - budget.budget:submit
  - budget.budget:approve
  - budget.budget:close
  - budget.budget_line:create
  - budget.budget_line:read
  - budget.budget_line:update
  - budget.budget_line:delete
  - budget.availability:read
  - budget.actuals:sync
  - budget.variance:read
  - budget.variance:generate
  - budget.variance:acknowledge
  - budget.health:read

quotas:
  - budget_management.api_reads
  - budget_management.api_writes
  - budget_management.actual_sync
  - budget_management.alert_generation

durable_jobs:
  - budget_management.sync_actuals
  - budget_management.generate_variance_alerts
  - budget_management.dispatch_submission_notification
  - budget_management.dispatch_variance_alert

domain_events:
  - budget.created
  - budget.updated
  - budget.submitted
  - budget.approved
  - budget.rejected
  - budget.revised
  - budget.closed
  - budget.allocations_replaced
  - budget.actuals_synced
  - budget.variance_alerted

health_checks:
  - name: governed_health
    endpoint: /api/v2/budget-management/health/
    interval: 60
    critical_dependencies:
      - database
      - tenant_context
      - rls
      - durable_jobs
