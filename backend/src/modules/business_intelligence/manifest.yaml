name: business_intelligence
display_name: Business Intelligence
version: 1.0.0
description: Governed self-service analytics, reports, dashboards, sharing, and durable execution
type: core
lifecycle: core
dependencies: []
permissions:
  - bi.dataset:read
  - bi.query:read
  - bi.query:create
  - bi.query:update
  - bi.query:delete
  - bi.query:execute
  - bi.report:read
  - bi.report:create
  - bi.report:update
  - bi.report:delete
  - bi.report:execute
  - bi.dashboard:read
  - bi.dashboard:create
  - bi.dashboard:update
  - bi.dashboard:delete
  - bi.dashboard:share
  - bi.dashboard:execute
  - bi.execution:read
  - bi.execution:cancel
sod_actions: []
search_indexes:
  - bi_query_definitions
  - bi_reports
  - bi_dashboards
  - bi_query_executions
ai_tools: []
metadata:
  api_version: v2
  entitlement: business_intelligence.core
  execution_quota: business_intelligence.executions
  extension_surfaces:
    - governed-dataset-registry
    - governed-template-registry
    - governed-visualization-registry
