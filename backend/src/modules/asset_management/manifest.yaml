# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: asset_management
version: 1.0.0
category: core_business
display_name: Asset Management
description: |
  Tenant-safe operational asset register and depreciation preview. The
  fixed_assets module remains the canonical authority for capitalization,
  posting, impairment, transfer, disposal, and the financial subledger.

bounded_context:
  owns:
    - operational_asset_register
    - asset_location
    - depreciation_preview_history
  delegates_to_fixed_assets:
    - capitalization
    - depreciation_posting
    - impairment
    - disposal
  compatibility:
    legacy_api: /api/v1/asset-management/
    financial_api: /api/v2/fixed-assets/
    id_preservation: asset_management identifiers remain stable; integrations map them explicitly

# Dependencies
dependencies:
  - name: accounting_finance
    version: ">=1.0.0"
    required: false
    purpose: Readiness discovery only; financial posting is delegated through fixed_assets services

# Permissions
permissions:
  - asset.asset:create
  - asset.asset:read
  - asset.asset:update
  - asset.asset:delete
  - asset.depreciation:read

# Health Checks
health_checks:
  - name: database_connectivity
    endpoint: /api/v1/asset-management/health/
    interval: 60

extension_contract:
  spi_version: "1.0.0"
  capabilities:
    - asset.detail_tab
    - asset.action
    - asset.identity_provider
    - asset.schema_field
  compatibility: semantic_versioning
