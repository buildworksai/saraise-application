# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: asset_management
version: 1.0.0
category: core_business
display_name: Asset Management
description: |
  Comprehensive asset lifecycle management including fixed assets, depreciation, and asset tracking.

# Dependencies
dependencies:
  - name: accounting_finance
    version: ">=1.0.0"
    required: false
    purpose: Depreciation journal entries

# Permissions
permissions:
  - asset.asset:create
  - asset.asset:read
  - asset.asset:update
  - asset.asset:delete
  - asset.depreciation:read

# Health Checks
health_checks:
  - name: database_connectivity
    endpoint: /health/db
    interval: 60
