name: ai-agent-management
version: 1.0.0
description: AI Agent Management - Runtime execution lifecycle and scheduler
type: foundation
lifecycle: core
dependencies:
  - core-identity >=1.0
permissions:
  - ai.agent:create
  - ai.agent:execute
  - ai.agent:view
  - ai.agent:update
  - ai.agent:delete
  - ai.agent:pause
  - ai.agent:resume
  - ai.agent:terminate
  - ai.tool:register
  - ai.tool:view
  - ai.tool:update
  - ai.tool:delete
  - ai.tool:invoke
  - ai.execution:view
  - ai.schedule:manage
  - ai.approval:view
  - ai.approval:request
  - ai.approval:decide
  - ai.governance:view
  - ai.governance:manage
  - ai.secret:view
  - ai.secret:manage
  - ai.secret:access
  - ai.usage:view
  - ai.audit:view
  - ai.evaluation:run
  - ai.evaluation:red_team
  - ai.health:view
sod_actions:
  - ai.agent:execute
  - ai.agent:terminate
search_indexes:
  - ai_agents
  - ai_agent_executions
ai_tools:
  - create_agent
  - execute_agent
  - pause_agent
  - resume_agent
  - terminate_agent
