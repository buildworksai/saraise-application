# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: master_data_management
version: 1.0.0
category: core_business
display_name: Master Data Management
description: |
  Centralized management of master data entities like customers, suppliers, products, and employees.

# Dependencies
dependencies: []

# Permissions
permissions:
  - mdm.entity:create
  - mdm.entity:read
  - mdm.entity:update
  - mdm.entity:delete
  - mdm.data_quality:read

# Health Checks
health_checks:
  - name: database_connectivity
    endpoint: /health/db
    interval: 60
