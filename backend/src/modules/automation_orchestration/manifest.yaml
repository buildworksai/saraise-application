name: automation-orchestration
version: 2.0.0
description: Tenant-safe durable technical DAG scheduling, execution, retry, and history
type: foundation
lifecycle: core
dependencies:
  - core-identity >=1.0.0
  - workflow-automation >=1.0.0
permissions:
  - automation_orchestration.definition:view
  - automation_orchestration.definition:manage
  - automation_orchestration.definition:publish
  - automation_orchestration.schedule:view
  - automation_orchestration.schedule:manage
  - automation_orchestration.run:view
  - automation_orchestration.run:execute
  - automation_orchestration.run:control
  - automation_orchestration.run:retry
  - automation_orchestration.catalog:view
sod_actions:
  - automation_orchestration.definition:publish
search_indexes: []
ai_tools: []
metadata:
  api_version: v2
  durable_job_commands:
    - automation_orchestration.execute_run
    - automation_orchestration.execute_task
    - automation_orchestration.scan_schedules
  extension_points:
    - name: automation_orchestration.node_registry
      spi_version: "1.0"
      registration: app_ready
  service_dependencies:
    - name: workflow_automation.execution
      version: "1.0"
      tenant_first: true
  health_probe: automation_orchestration.readiness
