# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: project_management
version: 1.0.0
category: core_business
display_name: Project Management
description: |
  Comprehensive project planning, task management, resource allocation, and time tracking.

# Dependencies
dependencies:
  - name: human_resources
    version: ">=1.0.0"
    required: false
    purpose: Employee resource allocation

# Permissions
permissions:
  - project.project:create
  - project.project:read
  - project.project:update
  - project.task:create
  - project.task:read
  - project.task:update
  - project.time_entry:create
  - project.time_entry:read
  - project.report:read

# SoD (Segregation of Duties) actions
sod_actions:
  - [project.task:create, project.time_entry:create]

# Health Checks
health_checks:
  - name: database_connectivity
    endpoint: /health/db
    interval: 60
