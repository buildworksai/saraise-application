# SARAISE open-source DMS foundation contract
name: dms
version: 2.0.0
description: Tenant-safe document storage, immutable versioning, folders, access grants, and bounded sharing
type: foundation
lifecycle: platform
dependencies:
  - core-identity >=1.0.0
permissions:
  - dms.folder:read
  - dms.folder:create
  - dms.folder:update
  - dms.folder:delete
  - dms.document:read
  - dms.document:create
  - dms.document:update
  - dms.document:move
  - dms.document:download
  - dms.document:delete
  - dms.version:read
  - dms.version:create
  - dms.version:restore
  - dms.permission:read
  - dms.permission:grant
  - dms.permission:update
  - dms.permission:revoke
  - dms.share:read
  - dms.share:create
  - dms.share:revoke
  - dms.health:read
  - dms.configuration:read
  - dms.configuration:write
  - dms.configuration:rollback
  - dms.configuration:import
  - dms.configuration:export
sod_actions: []
search_indexes:
  - dms_documents
  - dms_folders
ai_tools: []
entities:
  - {name: Folder, model: models.Folder, serializers: [FolderListSerializer, FolderDetailSerializer], tenant_scoped: true}
  - {name: Document, model: models.Document, serializers: [DocumentListSerializer, DocumentDetailSerializer], tenant_scoped: true}
  - {name: DocumentVersion, model: models.DocumentVersion, serializers: [DocumentVersionListSerializer, DocumentVersionDetailSerializer], tenant_scoped: true, immutable: true}
  - {name: DocumentPermission, model: models.DocumentPermission, serializers: [DocumentPermissionReadSerializer], tenant_scoped: true}
  - {name: DocumentShare, model: models.DocumentShare, serializers: [DocumentShareReadSerializer], tenant_scoped: true}
  - {name: DmsConfiguration, model: models.DmsConfiguration, serializers: [DmsConfigurationSerializer, DmsConfigurationWriteSerializer], tenant_scoped: true}
  - {name: DmsConfigurationVersion, model: models.DmsConfigurationVersion, serializers: [DmsConfigurationVersionSerializer], tenant_scoped: true, immutable: true}
  - {name: DmsConfigurationAudit, model: models.DmsConfigurationAudit, serializers: [DmsConfigurationAuditSerializer], tenant_scoped: true, immutable: true}
  - {name: DmsUploadIdempotency, model: models.DmsUploadIdempotency, serializers: [], tenant_scoped: true}
endpoints:
  - name: folders
    route: /api/v2/dms/folders/
    viewset: FolderViewSet
    methods: [GET, POST, PATCH, DELETE]
    actions: [{route: "{id}/move/", method: POST}, {route: "{id}/contents/", method: GET}]
  - name: documents
    route: /api/v2/dms/documents/
    viewset: DocumentViewSet
    methods: [GET, POST, PATCH, DELETE]
    actions: [{route: "{id}/move/", method: POST}, {route: "{id}/download/", method: GET}]
  - {name: versions, route: /api/v2/dms/document-versions/, viewset: DocumentVersionViewSet, methods: [GET, POST], actions: [{route: "{id}/restore/", method: POST}]}
  - {name: permissions, route: /api/v2/dms/document-permissions/, viewset: DocumentPermissionViewSet, methods: [GET, POST, PATCH, DELETE]}
  - {name: shares, route: /api/v2/dms/document-shares/, viewset: DocumentShareViewSet, methods: [GET, POST], actions: [{route: "{id}/revoke/", method: POST}]}
  - {name: configuration, route: /api/v2/dms/configuration/, viewset: DmsConfigurationViewSet, methods: [GET, PUT, POST], actions: [{route: current/, method: GET}, {route: current/, method: PUT}, {route: preview/, method: POST}, {route: history/, method: GET}, {route: audit/, method: GET}, {route: rollback/, method: POST}, {route: import/, method: POST}, {route: export/, method: GET}]}
  - {name: principals, route: /api/v2/dms/principals/, view: PrincipalSearchAPIView, methods: [GET]}
  - {name: public-share-download, route: "/api/v2/dms/public/shares/{token}/download/", view: PublicShareDownloadAPIView, methods: [GET]}
  - {name: health, route: /api/v2/dms/health/, view: DmsHealthAPIView, methods: [GET]}
metadata:
  api_version: v2
  api_prefix: /api/v2/dms/
  extension_surface: service-events-storage-ports
  searchable_fields:
    - document.name
    - folder.path
    - document.tags
    - document.metadata
  installation_projections:
    entitlement:
      module: dms
      edition: free
      enabled: true
      required: true
      capabilities:
        - dms.folder:read
        - dms.folder:create
        - dms.folder:update
        - dms.folder:delete
        - dms.document:read
        - dms.document:create
        - dms.document:update
        - dms.document:move
        - dms.document:download
        - dms.document:delete
        - dms.version:read
        - dms.version:create
        - dms.version:restore
        - dms.permission:read
        - dms.permission:grant
        - dms.permission:update
        - dms.permission:revoke
        - dms.share:read
        - dms.share:create
        - dms.share:revoke
        - dms.health:read
        - dms.configuration:read
        - dms.configuration:write
        - dms.configuration:rollback
        - dms.configuration:import
        - dms.configuration:export
    quotas:
      - resource: dms.api_reads
        required: true
        configuration_ref: api_read_quota
        period: month
      - resource: dms.api_writes
        required: true
        configuration_ref: api_write_quota
        period: month
      - resource: dms.storage_bytes
        required: true
        configuration_ref: storage_quota_bytes
        period: lifetime
  emitted_events:
    - dms.folder.created
    - dms.folder.moved
    - dms.folder.deleted
    - dms.document.uploaded
    - dms.document.metadata_updated
    - dms.document.moved
    - dms.document.downloaded
    - dms.document.deleted
    - dms.version.created
    - dms.version.restored
    - dms.permission.granted
    - dms.permission.updated
    - dms.permission.revoked
    - dms.share.created
    - dms.share.consumed
    - dms.share.revoked
    - dms.storage.cleanup_required
    - dms.quota.compensation_required
