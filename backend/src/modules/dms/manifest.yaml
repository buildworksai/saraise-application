# SARAISE open-source DMS foundation contract
name: dms
version: 2.0.0
description: Tenant-safe document storage, immutable versioning, folders, access grants, and bounded sharing
type: foundation
lifecycle: platform
dependencies:
  - core-identity >=1.0.0
permissions:
  - dms.folder:read
  - dms.folder:create
  - dms.folder:update
  - dms.folder:delete
  - dms.document:read
  - dms.document:create
  - dms.document:update
  - dms.document:move
  - dms.document:download
  - dms.document:delete
  - dms.version:read
  - dms.version:create
  - dms.version:restore
  - dms.permission:read
  - dms.permission:grant
  - dms.permission:update
  - dms.permission:revoke
  - dms.share:read
  - dms.share:create
  - dms.share:revoke
  - dms.health:read
sod_actions: []
search_indexes:
  - dms_documents
  - dms_folders
ai_tools: []
metadata:
  api_version: v2
  api_prefix: /api/v2/dms/
  extension_surface: service-events-storage-ports
  searchable_fields:
    - document.name
    - folder.path
    - document.tags
    - document.metadata
  installation_projections:
    entitlement:
      module: dms
      edition: free
      enabled: true
      required: true
      capabilities:
        - dms.folder:read
        - dms.folder:create
        - dms.folder:update
        - dms.folder:delete
        - dms.document:read
        - dms.document:create
        - dms.document:update
        - dms.document:move
        - dms.document:download
        - dms.document:delete
        - dms.version:read
        - dms.version:create
        - dms.version:restore
        - dms.permission:read
        - dms.permission:grant
        - dms.permission:update
        - dms.permission:revoke
        - dms.share:read
        - dms.share:create
        - dms.share:revoke
        - dms.health:read
    quotas:
      - resource: dms.api_reads
        required: true
        limit: 100000
        period: month
      - resource: dms.api_writes
        required: true
        limit: 10000
        period: month
      - resource: dms.storage_bytes
        required: true
        limit: 5368709120
        period: lifetime
  emitted_events:
    - dms.folder.created
    - dms.folder.moved
    - dms.folder.deleted
    - dms.document.uploaded
    - dms.document.metadata_updated
    - dms.document.moved
    - dms.document.downloaded
    - dms.document.deleted
    - dms.version.created
    - dms.version.restored
    - dms.permission.granted
    - dms.permission.revoked
    - dms.share.created
    - dms.share.consumed
    - dms.share.revoked
    - dms.storage.cleanup_required
