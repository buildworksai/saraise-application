name: purchase_management
version: 2.0.0
category: core_business
display_name: Purchase Management
description: Tenant-safe open-source procure-to-receipt workflows with versioned extension events.
api:
  authoritative: /api/v2/purchase-management/
  deprecated: /api/v1/purchase-management/
dependencies:
  - {name: inventory_management, version: ">=1.0.0", required: false, purpose: Validated inventory receipt posting}
  - {name: accounting_finance, version: ">=1.0.0", required: false, purpose: Accounting projections}
permissions:
  - purchase_management.supplier:read
  - purchase_management.supplier:create
  - purchase_management.supplier:update
  - purchase_management.supplier:archive
  - purchase_management.requisition:read
  - purchase_management.requisition:create
  - purchase_management.requisition:update
  - purchase_management.requisition:delete
  - purchase_management.requisition:submit
  - purchase_management.requisition:approve
  - purchase_management.requisition:reject
  - purchase_management.requisition:cancel
  - purchase_management.requisition:convert
  - purchase_management.rfq:read
  - purchase_management.rfq:create
  - purchase_management.rfq:update
  - purchase_management.rfq:delete
  - purchase_management.rfq:publish
  - purchase_management.rfq:close
  - purchase_management.rfq:award
  - purchase_management.quote:read
  - purchase_management.quote:create
  - purchase_management.quote:update
  - purchase_management.quote:delete
  - purchase_management.quote:submit
  - purchase_management.quote:compare
  - purchase_management.purchase_order:read
  - purchase_management.purchase_order:create
  - purchase_management.purchase_order:update
  - purchase_management.purchase_order:delete
  - purchase_management.purchase_order:submit
  - purchase_management.purchase_order:approve
  - purchase_management.purchase_order:dispatch
  - purchase_management.purchase_order:acknowledge
  - purchase_management.purchase_order:cancel
  - purchase_management.receipt:read
  - purchase_management.receipt:create
  - purchase_management.receipt:update
  - purchase_management.receipt:delete
  - purchase_management.receipt:complete
  - purchase_management.receipt:cancel
  - purchase_management.configuration:read
  - purchase_management.configuration:update
  - purchase_management.configuration:preview
  - purchase_management.configuration:activate
  - purchase_management.configuration:rollback
  - purchase_management.configuration:import
  - purchase_management.configuration:export
  - purchase_management.health:read
  - purchase_management.job:read
  - purchase_management.integration:retry
sod_actions:
  - [purchase_management.requisition:create, purchase_management.requisition:approve]
  - [purchase_management.purchase_order:create, purchase_management.purchase_order:approve]
  - [purchase_management.purchase_order:approve, purchase_management.receipt:complete]
  - [purchase_management.configuration:update, purchase_management.configuration:activate]
events:
  - purchase.rfq.publish.v1
  - purchase.rfq.awarded.v1
  - purchase.order.approved.v1
  - purchase.order.dispatch.v1
  - purchase.receipt.completed.v1
  - purchase.inventory.post-receipt.v1
  - purchase.configuration.activated.v1
extension_points:
  - {owner: supplier-delivery, version: v1}
  - {owner: inventory, version: v1}
  - {owner: accounting, version: v1}
  - {owner: scoring, version: v1}
  - {owner: compliance, version: v1}
health_checks:
  - {name: readiness, endpoint: /api/v2/purchase-management/health/, interval: 60}
