# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: regional
version: 1.0.0
description: Tenant-scoped regional resource configuration and governed lifecycle management
type: foundation
lifecycle: platform
dependencies:
  - core-identity >=1.0
  - localization >=1.0
permissions:
  - regional.resource:create
  - regional.resource:read
  - regional.resource:update
  - regional.resource:delete
  - regional.resource:activate
  - regional.resource:deactivate
  - regional.configuration:read
  - regional.configuration:write
  - regional.configuration:rollback
  - regional.configuration:import
  - regional.configuration:export
sod_actions:
  - [regional.resource:create, regional.resource:delete]
search_indexes:
  - regional_resources
entities:
  - RegionalResource
  - RegionalConfiguration
  - RegionalConfigurationVersion
  - RegionalAuditRecord
endpoints:
  - /api/v1/regional/resources/
  - /api/v1/regional/configuration/
  - /api/v1/regional/health/
ai_tools: []
