    resource-contract.list: &field_read {permission: customization_framework.field_definition:read, entitlement: customization_framework.field_definition, quota_resource: customization_framework.api_reads, quota_cost: 1}
    field-definition.list: *field_read
    field-definition.retrieve: *field_read
    field-definition.create: &field_create {permission: customization_framework.field_definition:create, entitlement: customization_framework.field_definition, quota_resource: customization_framework.api_writes, quota_cost: 1}
    field-definition.partial_update: &field_update {permission: customization_framework.field_definition:update, entitlement: customization_framework.field_definition, quota_resource: customization_framework.api_writes, quota_cost: 1}
    field-definition.destroy: &field_delete {permission: customization_framework.field_definition:delete, entitlement: customization_framework.field_definition, quota_resource: customization_framework.api_writes, quota_cost: 1}
    field-definition.activate: &field_publish {permission: customization_framework.field_definition:publish, entitlement: customization_framework.field_definition, quota_resource: customization_framework.api_writes, quota_cost: 1}
    field-definition.deprecate: *field_publish
    field-definition.retire: *field_publish
    field-definition.impact: &impact_read {permission: customization_framework.impact:read, entitlement: customization_framework.impact, quota_resource: customization_framework.api_reads, quota_cost: 1}
    field-definition.versions: *field_read
    field-definition.rollback: {permission: customization_framework.field_definition:rollback, entitlement: customization_framework.field_definition, quota_resource: customization_framework.api_writes, quota_cost: 1}
    field-definition.validate_value: {permission: customization_framework.field_value:validate, entitlement: customization_framework.field_value, quota_resource: customization_framework.validations, quota_cost: 1}
    field-value.list: &value_read {permission: customization_framework.field_value:read, entitlement: customization_framework.field_value, quota_resource: customization_framework.api_reads, quota_cost: 1}
    field-value.retrieve: *value_read
    field-value.create: &value_write {permission: customization_framework.field_value:write, entitlement: customization_framework.field_value, quota_resource: customization_framework.api_writes, quota_cost: 1}
    field-value.partial_update: *value_write
    field-value.destroy: {permission: customization_framework.field_value:delete, entitlement: customization_framework.field_value, quota_resource: customization_framework.api_writes, quota_cost: 1}
    form.list: &form_read {permission: customization_framework.form:read, entitlement: customization_framework.form, quota_resource: customization_framework.api_reads, quota_cost: 1}
    form.retrieve: *form_read
    form.create: {permission: customization_framework.form:create, entitlement: customization_framework.form, quota_resource: customization_framework.api_writes, quota_cost: 1}
    form.partial_update: &form_update {permission: customization_framework.form:update, entitlement: customization_framework.form, quota_resource: customization_framework.api_writes, quota_cost: 1}
    form.destroy: {permission: customization_framework.form:delete, entitlement: customization_framework.form, quota_resource: customization_framework.api_writes, quota_cost: 1}
    form.layout_versions:get: *form_read
    form.layout_versions:post: *form_update
    form.validate_layout: *form_update
    form.publish: {permission: customization_framework.form:publish, entitlement: customization_framework.form, quota_resource: customization_framework.api_writes, quota_cost: 1}
    form.archive: {permission: customization_framework.form:archive, entitlement: customization_framework.form, quota_resource: customization_framework.api_writes, quota_cost: 1}
    form.render_schema: *form_read
    form.impact: *impact_read
    form-layout.list: *form_read
    form-layout.retrieve: *form_read
    rule.list: &rule_read {permission: customization_framework.rule:read, entitlement: customization_framework.rule, quota_resource: customization_framework.api_reads, quota_cost: 1}
    rule.retrieve: *rule_read
    rule.create: {permission: customization_framework.rule:create, entitlement: customization_framework.rule, quota_resource: customization_framework.api_writes, quota_cost: 1}
    rule.partial_update: &rule_update {permission: customization_framework.rule:update, entitlement: customization_framework.rule, quota_resource: customization_framework.api_writes, quota_cost: 1}
    rule.destroy: {permission: customization_framework.rule:delete, entitlement: customization_framework.rule, quota_resource: customization_framework.api_writes, quota_cost: 1}
    rule.versions:get: *rule_read
    rule.versions:post: *rule_update
    rule.validate_version: *rule_update
    rule.publish: &rule_publish {permission: customization_framework.rule:publish, entitlement: customization_framework.rule, quota_resource: customization_framework.api_writes, quota_cost: 1}
    rule.pause: *rule_publish
    rule.resume: *rule_publish
    rule.retire: *rule_publish
    rule.evaluate: {permission: customization_framework.rule:evaluate, entitlement: customization_framework.rule, quota_resource: customization_framework.rule_evaluations, quota_cost: 1}
    rule.impact: *impact_read
    rule-version.list: *rule_read
    rule-version.retrieve: *rule_read
    rule-execution.list: &execution_read {permission: customization_framework.execution:read, entitlement: customization_framework.execution, quota_resource: customization_framework.api_reads, quota_cost: 1}
    rule-execution.retrieve: *execution_read
    health.get: {permission: customization_framework.health:read, entitlement: customization_framework.health, quota_resource: customization_framework.api_reads, quota_cost: 1}
    configuration.list: &configuration_read {permission: customization_framework.configuration:read, entitlement: customization_framework.configuration, quota_resource: customization_framework.api_reads, quota_cost: 1}
    configuration.update_configuration: {permission: customization_framework.configuration:update, entitlement: customization_framework.configuration, quota_resource: customization_framework.api_writes, quota_cost: 1}
    configuration.preview: {permission: customization_framework.configuration:update, entitlement: customization_framework.configuration, quota_resource: customization_framework.api_reads, quota_cost: 1}
    configuration.history: *configuration_read
    configuration.versions: *configuration_read
    configuration.rollback: {permission: customization_framework.configuration:rollback, entitlement: customization_framework.configuration, quota_resource: customization_framework.api_writes, quota_cost: 1}
    configuration.import_document: {permission: customization_framework.configuration:import, entitlement: customization_framework.configuration, quota_resource: customization_framework.api_writes, quota_cost: 1}
    configuration.export_document: {permission: customization_framework.configuration:export, entitlement: customization_framework.configuration, quota_resource: customization_framework.api_reads, quota_cost: 1}
  configuration:
