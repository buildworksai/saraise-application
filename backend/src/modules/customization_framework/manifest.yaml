# SARAISE customization-framework foundation contract
name: customization-framework
version: 2.0.0
description: Tenant-safe custom fields, versioned forms, declarative rules, and execution evidence
type: foundation
lifecycle: core
dependencies:
  - core-identity >=1.0.0
  - metadata-modeling >=1.0.0
  - security-access-control >=1.0.0
permissions:
  - customization_framework.field_definition:read
  - customization_framework.field_definition:create
  - customization_framework.field_definition:update
  - customization_framework.field_definition:delete
  - customization_framework.field_definition:publish
  - customization_framework.field_definition:rollback
  - customization_framework.field_value:read
  - customization_framework.field_value:write
  - customization_framework.field_value:delete
  - customization_framework.field_value:validate
  - customization_framework.form:read
  - customization_framework.form:create
  - customization_framework.form:update
  - customization_framework.form:delete
  - customization_framework.form:publish
  - customization_framework.form:archive
  - customization_framework.rule:read
  - customization_framework.rule:create
  - customization_framework.rule:update
  - customization_framework.rule:delete
  - customization_framework.rule:publish
  - customization_framework.rule:evaluate
  - customization_framework.execution:read
  - customization_framework.impact:read
  - customization_framework.health:read
  - customization_framework.configuration:read
  - customization_framework.configuration:update
  - customization_framework.configuration:rollback
  - customization_framework.configuration:import
  - customization_framework.configuration:export
sod_actions:
  - customization_framework.field_definition:create
  - customization_framework.field_definition:publish
  - customization_framework.form:create
  - customization_framework.form:publish
  - customization_framework.rule:create
  - customization_framework.rule:publish
  - customization_framework.field_definition:update
  - customization_framework.field_definition:delete
  - customization_framework.rule:update
  - customization_framework.rule:publish
  - customization_framework.configuration:update
  - customization_framework.configuration:rollback
search_indexes:
  - customization_field_definitions
  - customization_form_definitions
  - customization_business_rules
ai_tools: []
metadata:
  api_version: v2
  public_api_prefix: /api/v2/customization-framework/
  extension_surface: customization-registry-v1
  entities:
    - customization_field_definitions
    - customization_field_definition_versions
    - customization_field_values
    - customization_form_definitions
    - customization_form_layout_versions
    - customization_business_rules
    - customization_business_rule_versions
    - customization_rule_executions
    - customization_runtime_configurations
    - customization_runtime_configuration_versions
    - customization_configuration_audit_records
    - customization_idempotent_commands
    - customization_lifecycle_transition_records
    - customization_publication_records
  endpoints:
    - {registration: router, prefix: resource-contracts, basename: resource-contract, viewset: ResourceContractViewSet}
    - {registration: router, prefix: field-definitions, basename: field-definition, viewset: FieldDefinitionViewSet}
    - {registration: router, prefix: field-values, basename: field-value, viewset: FieldValueViewSet}
    - {registration: router, prefix: forms, basename: form, viewset: FormDefinitionViewSet}
    - {registration: router, prefix: form-layouts, basename: form-layout, viewset: FormLayoutVersionViewSet}
    - {registration: router, prefix: rules, basename: rule, viewset: BusinessRuleViewSet}
    - {registration: router, prefix: rule-versions, basename: rule-version, viewset: BusinessRuleVersionViewSet}
    - {registration: router, prefix: rule-executions, basename: rule-execution, viewset: RuleExecutionViewSet}
    - {registration: router, prefix: configuration, basename: configuration, viewset: RuntimeConfigurationViewSet}
    - {registration: path, route: health/, name: health, view: ModuleHealthAPIView}
  sod_pairs:
    - actions: [customization_framework.field_definition:create, customization_framework.field_definition:publish]
    - actions: [customization_framework.form:create, customization_framework.form:publish]
    - actions: [customization_framework.rule:create, customization_framework.rule:publish]
    - actions: [customization_framework.field_definition:update, customization_framework.field_definition:delete]
    - actions: [customization_framework.rule:update, customization_framework.rule:publish]
    - actions: [customization_framework.configuration:update, customization_framework.configuration:rollback]
