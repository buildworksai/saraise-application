# Rule: SARAISE-00001 (Module Manifest Required)
# Status: Implemented - v1.0.0

name: backup-recovery
version: 1.0.0
description: Extended backup capabilities - incremental backups, retention policies, archive management
type: foundation
lifecycle: platform
dependencies:
  - backup-disaster-recovery >=1.0
permissions:
  - backup.job:create
  - backup.job:read
  - backup.job:update
  - backup.job:delete
  - backup.schedule:create
  - backup.schedule:read
  - backup.schedule:update
  - backup.schedule:delete
  - backup.retention:create
  - backup.retention:read
  - backup.retention:update
  - backup.retention:delete
  - backup.archive:read
  - backup.restore:execute
sod_actions:
  - backup.job:create
  - backup.restore:execute
search_indexes:
  - backup_jobs
  - backup_schedules
  - backup_archives
ai_tools:
  - create_backup_job
  - schedule_backup
  - configure_retention_policy
