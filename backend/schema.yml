components:
  schemas:
    Agent:
      type: object
      description: Agent serializer for create/update/read operations.
      properties:
        id:
          type: string
          readOnly: true
        tenant_id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        identity_type:
          allOf:
          - $ref: '#/components/schemas/IdentityTypeEnum'
          description: |-
            User-bound or system-bound agent

            * `user_bound` - User-Bound Agent
            * `system_bound` - System-Bound Agent
        subject_id:
          type: string
          description: User ID (for user-bound) or system role ID (for system-bound)
          maxLength: 36
        session_id:
          type: string
          nullable: true
          description: Session ID for user-bound agents (null for system-bound)
          maxLength: 36
        framework:
          type: string
          description: Agent framework (langgraph, crewai, autogen, etc.)
          maxLength: 50
        config:
          description: Agent configuration (framework-specific)
        is_active:
          type: boolean
        created_by:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - framework
      - identity_type
      - name
      - subject_id
    AgentExecution:
      type: object
      description: Agent execution serializer.
      properties:
        id:
          type: string
          readOnly: true
        agent:
          type: string
        agent_id:
          type: string
          readOnly: true
        agent_name:
          type: string
          readOnly: true
        state:
          $ref: '#/components/schemas/StateEnum'
        session_id:
          type: string
          nullable: true
          description: Session ID for user-bound agents
          maxLength: 36
        task_definition:
          description: Task/goal definition for this execution
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        error_message:
          type: string
        result:
          nullable: true
        metadata:
          description: Execution metadata
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - agent
      - task_definition
    AgentRequest:
      type: object
      description: Agent serializer for create/update/read operations.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        identity_type:
          allOf:
          - $ref: '#/components/schemas/IdentityTypeEnum'
          description: |-
            User-bound or system-bound agent

            * `user_bound` - User-Bound Agent
            * `system_bound` - System-Bound Agent
        subject_id:
          type: string
          minLength: 1
          description: User ID (for user-bound) or system role ID (for system-bound)
          maxLength: 36
        session_id:
          type: string
          nullable: true
          description: Session ID for user-bound agents (null for system-bound)
          maxLength: 36
        framework:
          type: string
          minLength: 1
          description: Agent framework (langgraph, crewai, autogen, etc.)
          maxLength: 50
        config:
          description: Agent configuration (framework-specific)
        is_active:
          type: boolean
      required:
      - framework
      - identity_type
      - name
      - subject_id
    AgentSchedulerTask:
      type: object
      description: Agent scheduler task serializer.
      properties:
        id:
          type: string
          readOnly: true
        agent:
          type: string
        agent_name:
          type: string
          readOnly: true
        execution:
          type: string
          nullable: true
        priority:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Higher priority = execute first
        scheduled_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        retry_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        max_retries:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/AgentSchedulerTaskStatusEnum'
        error_message:
          type: string
        task_data: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - agent
      - scheduled_at
    AgentSchedulerTaskStatusEnum:
      enum:
      - pending
      - running
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    ApprovalRequest:
      type: object
      description: Approval request serializer.
      properties:
        id:
          type: string
          readOnly: true
        tool:
          type: string
        tool_name:
          type: string
          readOnly: true
        agent_execution:
          type: string
        agent_execution_id:
          type: string
          readOnly: true
        tool_invocation:
          type: string
          nullable: true
        requested_by:
          type: string
          description: User/agent who requested approval
          maxLength: 36
        requested_for:
          type: string
          description: User/agent who will execute if approved
          maxLength: 36
        approver_id:
          type: string
          readOnly: true
          nullable: true
          description: User ID who approved/rejected
        status:
          $ref: '#/components/schemas/Status2a4Enum'
        tool_input:
