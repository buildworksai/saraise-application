[mypy]
python_version = 3.10
plugins = mypy_django_plugin.main,mypy_drf_plugin.main
ignore_missing_imports = True
exclude = (^|/)tests?/

[mypy.plugins.django-stubs]
django_settings_module = saraise_backend.settings_static_analysis

[mypy-saraise_backend.settings,src.core.auth.policy_permissions,src.core.auth.rbac,src.core.compliance_models,src.core.compliance_service,src.core.licensing.*,src.core.management.commands.seed_default_users,src.core.module_installer,src.core.module_signing,src.core.module_upgrader,src.core.notifications.services,src.modules.accounting_finance.services,src.modules.ai_agent_management.approval_service,src.modules.ai_agent_management.audit_service,src.modules.ai_agent_management.egress_service,src.modules.ai_agent_management.evaluation.harness,src.modules.ai_agent_management.quota_service,src.modules.ai_agent_management.scheduler,src.modules.ai_agent_management.secret_service,src.modules.ai_agent_management.token_service,src.modules.ai_agent_management.tool_registry,src.modules.ai_agent_management.tool_service,src.modules.asset_management.services,src.modules.billing_subscriptions.services,src.modules.crm.services,src.modules.data_migration.services,src.modules.integration_platform.services,src.modules.metadata_modeling.serializers,src.modules.metadata_modeling.services,src.modules.platform_management.api,src.modules.security_access_control.services,src.modules.tenant_management.services,src.modules.workflow_automation.action_executor]
