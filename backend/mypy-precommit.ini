[mypy]
# Transitional migration policy. The repository's strict target remains in
# pyproject.toml; every finding under this narrower scope is fingerprinted by
# mypy-baseline.txt so no new or changed error can pass unnoticed.
python_version = 3.10
plugins = mypy_django_plugin.main,mypy_drf_plugin.main
ignore_missing_imports = True
exclude = (^|/)tests?/

[mypy.plugins.django-stubs]
django_settings_module = saraise_backend.settings_static_analysis
