global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'saraise-auth'
    static_configs:
      - targets: ['saraise-auth:8001']
    metrics_path: /metrics

  - job_name: 'saraise-runtime'
    static_configs:
      - targets: ['saraise-runtime:8002']
    metrics_path: /metrics

  - job_name: 'saraise-policy-engine'
    static_configs:
      - targets: ['saraise-policy-engine:8003']
    metrics_path: /metrics

  - job_name: 'saraise-control-plane'
    static_configs:
      - targets: ['saraise-control-plane:8004']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
