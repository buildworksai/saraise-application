# SARAISE Consolidated Development Docker Compose
# All services (Phase 1-6) in single network with port standardization
# 
# PORT CONVENTION:
# - Platform containers: 1xxxx (e.g., 18000:8000)
# - Application containers: 2xxxx (e.g., 28000:8000)

services:
  # ===== Infrastructure Services =====
  # NOTE: For development, we use the shared postgres/redis from platform docker-compose.
  # These are defined here with different container names to avoid conflicts,
  # but in practice, the platform's postgres/redis are used via the shared network.
  
  # PostgreSQL Database (shared with platform via network)
  # Application port convention: 2xxxx (e.g., 25432:5432)
  postgres:
    image: postgres:17-alpine
    container_name: application-db
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    ports:
      - "25432:5432"  # Application: 2xxxx
    environment:
      - POSTGRES_DB=saraise
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saraise-network

  # Redis Cache & Session Store (shared with platform via network)
  # Application port convention: 2xxxx (e.g., 26379:6379)
  redis:
    image: redis:7-alpine
    container_name: application-redis
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    ports:
      - "26379:6379"  # Application: 2xxxx
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - saraise-network

  # ===== Platform Services (Control Plane) =====
  # NOTE: Platform services (auth, policy-engine, runtime, control-plane) are managed
  # by saraise-platform/docker-compose.dev.yml and run on 1xxxx ports.
  # They are NOT included here to avoid container name conflicts.
  # Access platform services via: http://localhost:18001, 18002, 18003, 18004
  
  # Platform services (auth, policy-engine, runtime, control-plane) are managed
  # by saraise-platform/docker-compose.dev.yml and run on 1xxxx ports.
  # They are NOT included here to avoid container name conflicts.
  # Access platform services via: http://localhost:18001, 18002, 18003, 18004

  # ===== Phase 4/5: Django Backend (Legacy) =====
  # NOTE: This legacy backend service has been removed.
  # Use the main backend service instead (saraise-application-backend on port 28000).

  # ===== Application Layer (Runtime Plane) =====
  # This is the Django backend that serves end-user traffic
  # It executes business logic and enforces policies from Control Plane
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/saraise
      - DB_NAME=saraise
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=saraise_backend.settings
      - PYTHONPATH=/app
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,backend,0.0.0.0
    ports:
      - "28000:8000"  # Application: 2xxxx (fixed port)
    volumes:
      - ./backend:/app
      - backend_venv:/app/venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        pip install -r requirements.txt &&
        python manage.py migrate &&
        python manage.py seed_default_users &&
        python manage.py runserver 0.0.0.0:8000
      "
    networks:
      - saraise-network

  # ===== Application Frontend (Runtime Plane) =====
  # React UI for tenant users - serves application layer only
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ui-web
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      - VITE_API_BASE_URL=http://localhost:28000
      - NODE_ENV=development
    ports:
      - "25173:5173"  # Application: 2xxxx (fixed port)
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev
    networks:
      - saraise-network

  # ===== Observability Services =====
  
  # Prometheus for metrics collection
  # Application port convention: 2xxxx (e.g., 29090:9090)
  prometheus:
    image: prom/prometheus:latest
    container_name: application-prometheus
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "29090:9090"  # Application: 2xxxx
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - saraise-network

  # Jaeger for distributed tracing
  # Application port convention: 2xxxx
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: application-jaeger
    ports:
      - "25775:5775/udp"  # Application: 2xxxx
      - "26831:6831/udp"  # Application: 2xxxx
      - "26832:6832/udp"  # Application: 2xxxx
      - "25778:5778"  # Application: 2xxxx
      - "26686:16686"  # Jaeger UI (Application: 2xxxx)
      - "24268:14268"  # Application: 2xxxx
      - "24250:14250"  # Application: 2xxxx
      - "29411:9411"  # Application: 2xxxx
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - saraise-network

  # Grafana for dashboards
  # Application port convention: 2xxxx (e.g., 23000:3000)
  grafana:
    image: grafana/grafana:latest
    container_name: application-grafana
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "23000:3000"  # Application: 2xxxx
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - saraise-network

  # Alertmanager for alert routing
  # Application port convention: 2xxxx (e.g., 29093:9093)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: application-alertmanager
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    ports:
      - "29093:9093"  # Application: 2xxxx
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - saraise-network

networks:
  saraise-network:
    external: true
    name: saraise-network

volumes:
  postgres_data:
    external: true
    name: saraise-postgres-data
  prometheus_data:
  grafana_data:
  backend_venv:
  frontend_node_modules:
